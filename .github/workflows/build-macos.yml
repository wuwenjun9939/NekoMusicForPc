name: Build macOS PKG

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.2'
          host: 'mac'
          target: 'desktop'
          arch: 'clang_64'
          modules: 'qtmultimedia'

      - name: Generate AppIcon.icns
        run: |
          cd "$GITHUB_WORKSPACE"
          mkdir -p src/resources/macos
          ICONSET=$(mktemp -d)/AppIcon.iconset
          mkdir -p "$ICONSET"
          SRC="$GITHUB_WORKSPACE/packaging/icons/hicolor/512x512/apps/nekomusic.png"
          for size in 16 32 64 128 256 512; do
            sips -z $size $size "$SRC" --out "$ICONSET/icon_${size}x${size}.png"
            sips -z $((size*2)) $((size*2)) "$SRC" --out "$ICONSET/icon_${size}x${size}@2x.png"
          done
          iconutil -c icns "$ICONSET" -o "$GITHUB_WORKSPACE/src/resources/macos/AppIcon.icns"

      - name: Configure CMake
        run: |
          cd "$GITHUB_WORKSPACE"
          mkdir -p build-macos
          cd build-macos
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$Qt6_DIR" \
            -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64"

      - name: Build
        run: |
          cd "$GITHUB_WORKSPACE/build-macos"
          cmake --build . -j$(sysctl -n hw.ncpu) --verbose

      - name: Install
        run: |
          cd "$GITHUB_WORKSPACE/build-macos"
          cmake --install . --prefix "$GITHUB_WORKSPACE/build-macos/install"

      - name: Confirm Install Success
        run: |
          cd "$GITHUB_WORKSPACE"
          if [ ! -d "build-macos/install/NekoMusic.app" ] && [ ! -d "build-macos/install/Neko云音乐.app" ]; then
            echo "❌ Expected .app not found in build-macos/install/"
            echo "build-macos/install contents:"
            ls -la build-macos/install/
            exit 1
          fi
          echo "✅ Valid .app found in install/"

      - name: Verify Universal Binary
        run: |
          cd "$GITHUB_WORKSPACE"
          APP_DIR=$(find build-macos/install -name "*.app" -type d | head -1)
          if [ -z "$APP_DIR" ]; then
            echo "❌ No .app bundle found in build-macos/install/"
            ls -la build-macos/install/
            exit 1
          fi
          BIN_PATH="$APP_DIR/Contents/MacOS/$(basename "$APP_DIR" .app)"
          if [ -f "$BIN_PATH" ]; then
            echo "✅ Found app binary: $BIN_PATH"
            file "$BIN_PATH"
            lipo -info "$BIN_PATH"
          else
            echo "❌ Executable not found at $BIN_PATH"
            echo "Contents of $APP_DIR/Contents/MacOS/:"
            ls -la "$APP_DIR/Contents/MacOS/"
            exit 1
          fi

      - name: Package PKG
        run: |
          cd "$GITHUB_WORKSPACE/build-macos"
          cpack -G productbuild \
            -D CMAKE_INSTALL_PREFIX="$GITHUB_WORKSPACE/build-macos/install"

      - name: Find PKG
        id: find-pkg
        run: |
          cd "$GITHUB_WORKSPACE"
          PKG=$(find build-macos -name "*.pkg" -type f | head -1)
          if [ -z "$PKG" ]; then
            echo "❌ No .pkg file found"
            ls -la build-macos/
            exit 1
          fi
          echo "pkg_path=$PKG" >> $GITHUB_OUTPUT
          echo "pkg_name=$(basename "$PKG")" >> $GITHUB_OUTPUT
          echo "✅ Found PKG: $PKG"
          ls -lh "$PKG"

      - name: Upload PKG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.find-pkg.outputs.pkg_name }}
          path: ${{ steps.find-pkg.outputs.pkg_path }}

      - name: Upload release asset (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.find-pkg.outputs.pkg_path }}