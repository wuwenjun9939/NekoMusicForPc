name: Build macOS PKG (pkgbuild fallback)

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Print environment (debug)
        run: |
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          echo "Qt6_DIR=$Qt6_DIR"
          uname -a
          sw_vers

      - name: Setup Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.2'
          host: 'mac'
          target: 'desktop'
          arch: 'clang_64'
          modules: 'qtmultimedia'

      - name: Configure CMake
        run: |
          set -e
          cd "$GITHUB_WORKSPACE"
          rm -rf build-macos
          mkdir -p build-macos
          cd build-macos
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$Qt6_DIR" \
            -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64" \
            -DCMAKE_VERBOSE_MAKEFILE=ON

      - name: Build
        run: |
          set -e
          cd "$GITHUB_WORKSPACE/build-macos"
          cmake --build . -j$(sysctl -n hw.ncpu) --verbose

      - name: Install to install-prefix
        run: |
          set -e
          BUILD_DIR="$GITHUB_WORKSPACE/build-macos"
          INSTALL_PREFIX="$BUILD_DIR/install"
          echo "Installing to $INSTALL_PREFIX"
          cd "$BUILD_DIR"
          cmake --install . --prefix "$INSTALL_PREFIX" || { echo "cmake --install failed"; exit 1; }
          echo "== install dir listing =="
          ls -la "$INSTALL_PREFIX" || true
          echo "== find .app =="
          find "$INSTALL_PREFIX" -maxdepth 4 -type d -name "*.app" -print || true

      - name: Package with pkgbuild (component -> /Applications)
        run: |
          set -e
          BUILD_DIR="$GITHUB_WORKSPACE/build-macos"
          INSTALL_PREFIX="$BUILD_DIR/install"
          PKG_OUTDIR="$BUILD_DIR/pkg"
          mkdir -p "$PKG_OUTDIR"
          # find the first .app installed
          APP_DIR=$(find "$INSTALL_PREFIX" -type d -name "*.app" -print | head -n1 || true)
          if [ -z "$APP_DIR" ]; then
            echo "❌ No .app found in install prefix ($INSTALL_PREFIX). Install listing:"
            ls -la "$INSTALL_PREFIX"
            exit 1
          fi
          echo "Found app to package: $APP_DIR"
          # use a version string (try to read from CMakeCache or fallback)
          VERSION="1.0.0"
          if [ -f "$BUILD_DIR/CMakeCache.txt" ]; then
            grep -E 'PROJECT_VERSION' "$BUILD_DIR/CMakeCache.txt" | sed -n 's/.*=//p' | head -n1 | grep . && VERSION=$(grep -E 'PROJECT_VERSION' "$BUILD_DIR/CMakeCache.txt" | sed -n 's/.*=//p' | head -n1)
          fi
          PKG_PATH="$PKG_OUTDIR/NekoMusic-${VERSION}.pkg"
          echo "Creating pkg: $PKG_PATH (installing to /Applications)"
          # pkgbuild with --component is the simplest and most reliable for .app bundles
          pkgbuild --component "$APP_DIR" --install-location "/Applications" \
            --identifier "com.nekomusic.app" --version "$VERSION" "$PKG_PATH"
          echo "== pkg created =="
          ls -lh "$PKG_PATH"
          # expand to inspect contents
          TMPDIR=$(mktemp -d)
          pkgutil --expand "$PKG_PATH" "$TMPDIR/expanded" || echo "pkgutil expand failed"
          echo "Expanded package tree:"
          find "$TMPDIR/expanded" -maxdepth 4 -print || true
          echo "::set-output name=pkg_path::$PKG_PATH"

      - name: Upload PKG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-pkg
          path: ${{ steps.Package_with_pkgbuild.outputs.pkg_path || steps.package_with_pkgbuild.outputs.pkg_path || steps.show_pkg.outputs.pkg_path || '' }}