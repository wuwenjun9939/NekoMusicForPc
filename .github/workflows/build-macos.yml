name: Build macOS PKG (robust)

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Print environment (debug)
        run: |
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          echo "Qt6_DIR=$Qt6_DIR"
          uname -a
          sw_vers

      - name: Setup Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.2'
          host: 'mac'
          target: 'desktop'
          arch: 'clang_64'
          modules: 'qtmultimedia'

      - name: Generate AppIcon.icns (with fallback)
        run: |
          set -e
          cd "$GITHUB_WORKSPACE"
          SRC="$GITHUB_WORKSPACE/packaging/icons/hicolor/512x512/apps/nekomusic.png"
          echo "Looking for icon at: $SRC"
          if [ ! -f "$SRC" ]; then
            echo "WARN: source icon not found: $SRC"
            # fallback to a system icon (should exist on macOS runners)
            FALLBACK_ICNS="/System/Library/CoreServices/CoreTypes.bundle/Contents/Resources/GenericApplicationIcon.icns"
            if [ -f "$FALLBACK_ICNS" ]; then
              echo "Using system fallback icon: $FALLBACK_ICNS"
              SRC="$FALLBACK_ICNS"
            else
              echo "No fallback icon available; will continue without custom icon"
              SRC=""
            fi
          fi

          # generate icns only if we have a source
          if [ -n "$SRC" ]; then
            mkdir -p src/resources/macos
            ICONSET=$(mktemp -d)/AppIcon.iconset
            mkdir -p "$ICONSET"
            for size in 16 32 64 128 256 512; do
              # sips can convert icns/png; produce base and @2x
              sips -z $size $size "$SRC" --out "$ICONSET/icon_${size}x${size}.png" >/dev/null 2>&1 || true
              sips -z $((size*2)) $((size*2)) "$SRC" --out "$ICONSET/icon_${size}x${size}@2x.png" >/dev/null 2>&1 || true
            done
            # create icns (iconutil returns non-zero if inputs are odd; ignore but check file)
            iconutil -c icns "$ICONSET" -o "$GITHUB_WORKSPACE/src/resources/macos/AppIcon.icns" >/dev/null 2>&1 || true
            echo "Generated icns at src/resources/macos/AppIcon.icns"
            ls -la src/resources/macos || true
          else
            echo "Skipping icon generation (no source)."
          fi

      - name: Configure CMake
        run: |
          set -e
          cd "$GITHUB_WORKSPACE"
          rm -rf build-macos
          mkdir -p build-macos
          cd build-macos
          echo "Running cmake ..."
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$Qt6_DIR" \
            -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64" \
            -DCMAKE_VERBOSE_MAKEFILE=ON

      - name: Build
        run: |
          set -e
          cd "$GITHUB_WORKSPACE/build-macos"
          cmake --build . -j$(sysctl -n hw.ncpu) --verbose

      - name: Install to install-prefix
        run: |
          set -e
          BUILD_DIR="$GITHUB_WORKSPACE/build-macos"
          INSTALL_PREFIX="$BUILD_DIR/install"
          echo "Installing to $INSTALL_PREFIX"
          cd "$BUILD_DIR"
          cmake --install . --prefix "$INSTALL_PREFIX" || { echo "cmake --install failed"; exit 1; }
          echo "== install dir listing =="
          ls -la "$INSTALL_PREFIX" || true
          echo "== find .app =="
          find "$INSTALL_PREFIX" -maxdepth 4 -type d -name "*.app" -print || true

      - name: Package with pkgbuild (single .app -> .pkg)
        run: |
          set -e
          BUILD_DIR="$GITHUB_WORKSPACE/build-macos"
          INSTALL_PREFIX="$BUILD_DIR/install"
          PKG_OUTDIR="$BUILD_DIR/pkg"
          mkdir -p "$PKG_OUTDIR"
          APP_DIR=$(find "$INSTALL_PREFIX" -type d -name "*.app" -print | head -n1 || true)
          if [ -z "$APP_DIR" ]; then
            echo "❌ No .app found in install prefix ($INSTALL_PREFIX). Install listing:"
            ls -la "$INSTALL_PREFIX" || true
            exit 1
          fi
          echo "Found app to package: $APP_DIR"
          # derive version if possible
          VERSION="0.0.0"
          if [ -f "$BUILD_DIR/CMakeCache.txt" ]; then
            # try to parse PROJECT_VERSION from cache (fallback if not present)
            ver=$(grep -E "^PROJECT_VERSION:STATIC=" "$BUILD_DIR/CMakeCache.txt" | sed -E 's/.*=//')
            if [ -n "$ver" ]; then VERSION="$ver"; fi
          fi
          PKG_PATH="$PKG_OUTDIR/NekoMusic-${VERSION}.pkg"
          echo "Creating pkg: $PKG_PATH (installing to /Applications)"
          pkgbuild --component "$APP_DIR" --install-location "/Applications" \
            --identifier "com.nekomusic.app" --version "$VERSION" "$PKG_PATH"
          echo "== pkg created =="
          ls -lh "$PKG_PATH" || true
          # expand pkg for inspection
          TMPDIR=$(mktemp -d)
          pkgutil --expand "$PKG_PATH" "$TMPDIR/expanded" || echo "pkgutil expand failed"
          echo "Expanded package tree (top):"
          ls -la "$TMPDIR/expanded" || true
          echo "PKG_PATH=$PKG_PATH"
          echo "pkg_path=$PKG_PATH" >> $GITHUB_OUTPUT
          echo "pkg_name=$(basename "$PKG_PATH")" >> $GITHUB_OUTPUT

      - name: Show pkg info (redundant check)
        run: |
          set -e
          PKG="${{ steps.Package_with_pkgbuild.outputs.pkg_path || steps.Package_with_pkgbuild.outputs.pkg_path || '' }}"
          # The above is placeholder; prefer reading via find to be safe
          PKG=$(find "$GITHUB_WORKSPACE/build-macos" -name "*.pkg" -type f | head -n1 || true)
          if [ -z "$PKG" ]; then
            echo "❌ No pkg found for upload"
            ls -la "$GITHUB_WORKSPACE/build-macos" || true
            exit 1
          fi
          echo "Preparing to upload: $PKG"
          ls -lh "$PKG"
          TMPDIR=$(mktemp -d)
          pkgutil --expand "$PKG" "$TMPDIR/expanded" || true
          echo "Expanded listing:"
          find "$TMPDIR/expanded" -maxdepth 4 -print || true

      - name: Upload PKG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-pkg
          path: ${{ steps.Package_with_pkgbuild.outputs.pkg_path || steps.find_pkg.outputs.pkg_path || '' }}